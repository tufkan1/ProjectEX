name: Release

on:
  push:
    tags: ["v*", "26.3"]

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v6
      - run: chmod +x ./gradlew

      - name: Verify version, source commit, and signed tag
        shell: bash
        run: |
          expected="v$(sed -n 's/^mod_version=//p' gradle.properties)"
          [[ "${GITHUB_REF_NAME}" == "26.3" ]] && expected="26.3"
          test "${GITHUB_REF_NAME}" = "${expected}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match ${expected}" >&2
            exit 1
          }
          git fetch origin main
          test "$(git rev-list -n 1 "${GITHUB_REF_NAME}")" = "$(git rev-parse origin/main)" || {
            echo "Release tag must point to the current main commit" >&2
            exit 1
          }
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "${GITHUB_WORKSPACE}/.github/release-signers"
          git verify-tag "${GITHUB_REF_NAME}"

      - name: Build and run release audits
        shell: bash
        run: |
          mkdir -p dist first-build
          if [[ "${GITHUB_REF_NAME}" == "26.3" ]]; then
            for profile in 26.3-snapshot-{1..4}; do
              ./gradlew --no-daemon -PtargetProfile="${profile}" clean releaseAudit runGameTest verifyNoCompatClient
              cp build/libs/*.jar dist/
              cp build/libs/*.jar first-build/
              cp build/reports/cyclonedx-direct/bom.json "dist/projectex-fabric-${profile}.cdx.json"
            done
          else
            ./gradlew --no-daemon clean releaseAudit runGameTest verifyNoCompatClient
            cp build/libs/*.jar dist/
            cp build/libs/*.jar first-build/
            cp build/reports/cyclonedx-direct/bom.json dist/projectex-fabric.cdx.json
          fi

      - name: Verify Jade compatibility profile
        if: github.ref_name != '26.3'
        run: ./gradlew --no-daemon -PcompatJade verifyJadeCompatClient --rerun-tasks

      - name: Rebuild jars and prove reproducibility
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == "26.3" ]]; then
            for profile in 26.3-snapshot-{1..4}; do
              ./gradlew --no-daemon -PtargetProfile="${profile}" clean jar sourcesJar javadocJar
              for rebuilt in build/libs/*.jar; do
                original="first-build/$(basename "${rebuilt}")"
                cmp --silent "${original}" "${rebuilt}" || {
                  echo "Non-reproducible artifact: $(basename "${rebuilt}")" >&2
                  sha256sum "${original}" "${rebuilt}" >&2
                  exit 1
                }
              done
            done
          else
            ./gradlew --no-daemon clean jar sourcesJar javadocJar
            for rebuilt in build/libs/*.jar; do
              original="first-build/$(basename "${rebuilt}")"
              cmp --silent "${original}" "${rebuilt}" || {
                echo "Non-reproducible artifact: $(basename "${rebuilt}")" >&2
                sha256sum "${original}" "${rebuilt}" >&2
                exit 1
              }
            done
          fi

      - name: Create checksums
        shell: bash
        run: (cd dist && sha256sum *.jar *.cdx.json > SHA256SUMS)

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/*.jar

      - name: Attest runtime SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/*.jar
          sbom-path: dist/projectex-fabric.cdx.json

      - name: Publish immutable GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          prerelease=""
          [[ "${GITHUB_REF_NAME}" == *-* ]] && prerelease="--prerelease"
          notes="docs/release-notes/${GITHUB_REF_NAME#v}.md"
          test -f "${notes}"
          title="ProjectEX ${GITHUB_REF_NAME} for Minecraft 26.2"
          [[ "${GITHUB_REF_NAME}" == "26.3" ]] && title="ProjectEX 26.3 Snapshot 1-4"
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --title "${title}" \
            --notes-file "${notes}" ${prerelease}
