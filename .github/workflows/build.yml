name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Java 25 / Fabric 26.2
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "25"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Grant wrapper execute permission
        run: chmod +x ./gradlew

      - name: Generate resources
        run: ./gradlew --stacktrace runDatagen

      - name: Verify generated resources are committed
        shell: bash
        run: |
          git diff --exit-code -- src/main/generated
          test -z "$(git status --porcelain --untracked-files=all -- src/main/generated)"

      - name: Check, build, and audit artifacts
        run: ./gradlew --stacktrace check build verifyReleaseArtifacts

      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ github.sha }}
          path: |
            build/reports/
            build/test-results/
            build/run/gameTest/logs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload jars
        uses: actions/upload-artifact@v7
        with:
          name: projectex-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14

  client-game-test:
    name: Client GameTest / Fabric 26.2 / ${{ matrix.compat }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - compat: none
            gradle-args: verifyNoCompatClient
          - compat: jade
            gradle-args: -PcompatJade verifyJadeCompatClient
          - compat: mod-menu
            gradle-args: -PcompatModMenu verifyModMenuCompatClient
          - compat: jei
            gradle-args: -PcompatJei verifyJeiCompatClient
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "25"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Grant wrapper execute permission
        run: chmod +x ./gradlew

      - name: Run headless client journey
        run: ./gradlew --stacktrace ${{ matrix.gradle-args }}

      - name: Upload client test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: client-gametest-${{ matrix.compat }}-${{ github.sha }}
          path: |
            build/run/clientGameTest/logs/
            build/run/clientGameTest/screenshots/
            build/productionClientGameTest/logs/
          if-no-files-found: ignore
          retention-days: 14
