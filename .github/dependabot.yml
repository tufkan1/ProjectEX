version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels: ["area: dependencies", "type: maintenance"]
    commit-message:
      prefix: "build"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels: ["area: ci", "area: dependencies", "type: maintenance"]
    commit-message:
      prefix: "ci"
